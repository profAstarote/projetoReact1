<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d8ff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#00d8ff" stop-opacity="0" />
    </radialGradient>
    
    <style>
      .orbit { 
        fill: none; 
        stroke: #00d8ff; 
        stroke-width: 4; 
        stroke-linecap: round;
        opacity: 0.6;
      }
      .electron {
        fill: #00d8ff;
        filter: drop-shadow(0 0 5px #00d8ff);
      }
      .center-a {
        fill: #ffffff;
        font-family: Arial, sans-serif;
        font-weight: bold;
        font-size: 80px;
      }
      .text-ring {
        fill: #b0c4de;
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-weight: 800;
        font-size: 42px;
        letter-spacing: 5px;
      }
      
      /* Animações */
      @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 0.4; stroke-width: 4; }
        50% { opacity: 1; stroke-width: 6; }
      }

      .orbit-group {
        transform-origin: center;
        animation: rotate 10s linear infinite;
      }
      
      .inner-glow {
        animation: pulse 3s ease-in-out infinite;
      }
    </style>
  </defs>

  <circle cx="250" cy="250" r="230" fill="#1a2634" stroke="#2c3e50" stroke-width="8" />
  
  <circle cx="250" cy="250" r="120" fill="url(#glow)" class="inner-glow" />

  <path id="textPathTop" d="M 100,250 A 150,150 0 0,1 400,250" fill="none" />
  <path id="textPathBottom" d="M 100,250 A 150,150 0 0,0 400,250" fill="none" />
  
  <text class="text-ring">
    <textPath href="#textPathTop" startOffset="50%" text-anchor="middle">REACT</textPath>
  </text>
  <text class="text-ring">
    <textPath href="#textPathBottom" startOffset="50%" text-anchor="middle">AVANCATEC</textPath>
  </text>

  <g class="orbit-group">
    <ellipse class="orbit" cx="250" cy="250" rx="180" ry="70" transform="rotate(0 250 250)" />
    <circle class="electron" r="8">
      <animateMotion dur="3s" repeatCount="indefinite" path="M -180,0 a 180,70 0 1,0 360,0 a 180,70 0 1,0 -360,0" />
    </circle>

    <ellipse class="orbit" cx="250" cy="250" rx="180" ry="70" transform="rotate(60 250 250)" />
    <circle class="electron" r="8">
      <animateMotion dur="3.5s" repeatCount="indefinite" path="M -90,-155 a 180,70 60 1,0 180,311 a 180,70 60 1,0 -180,-311" />
    </circle>

    <ellipse class="orbit" cx="250" cy="250" rx="180" ry="70" transform="rotate(120 250 250)" />
  </g>

  <circle cx="250" cy="250" r="50" fill="#0f172a" stroke="#00d8ff" stroke-width="4" />
  <text x="250" y="280" text-anchor="middle" class="center-a">A</text>
  
  <path d="M 230,260 Q 250,230 285,230 L 275,240 M 285,230 L 270,225" fill="none" stroke="#eab308" stroke-width="6" stroke-linecap="round" />
</svg>
